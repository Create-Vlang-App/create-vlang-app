<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Create Vlang App</title>
  <desc id="desc">Create Vlang App brand hero banner  V logomark with scaffolding workflow panels.</desc>
  <defs>
    <linearGradient id="repo-bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#164e63"/>
    </linearGradient>
    <linearGradient id="repo-edge" x1="96" y1="84" x2="1184" y2="558" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="repo-glow-a" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(268 190) rotate(42) scale(450 270)">
      <stop stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="repo-glow-b" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(990 410) rotate(138) scale(480 300)">
      <stop stop-color="#06B6D4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="repo-grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#94A3B8" stroke-opacity="0.07"/>
    </pattern>
    <filter id="repo-shadow" x="-18%" y="-20%" width="136%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <filter id="logo-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" rx="34" fill="url(#repo-bg)"/>
  <rect width="1280" height="640" rx="34" fill="url(#repo-grid)"/>
  <rect width="1280" height="640" rx="34" fill="url(#repo-glow-a)"/>
  <rect width="1280" height="640" rx="34" fill="url(#repo-glow-b)"/>

  <!-- Main window frame -->
  <g filter="url(#repo-shadow)">
    <rect x="96" y="84" width="1088" height="476" rx="32" fill="#0f172a" stroke="url(#repo-edge)" stroke-opacity="0.72"/>
    <!-- Title bar -->
    <rect x="96" y="84" width="1088" height="72" rx="32" fill="#1e293b" fill-opacity="0.92"/>
    <!-- Traffic light dots -->
    <circle cx="144" cy="120" r="8" fill="#EF4444"/>
    <circle cx="174" cy="120" r="8" fill="#8B5CF6"/>
    <circle cx="204" cy="120" r="8" fill="#06B6D4"/>

    <!-- V logomark in title bar -->
    <g transform="translate(598, 104)" filter="url(#logo-glow)">
      <path d="M5 31 L18 5 L31 31 Z" fill="url(#logo-grad)" fill-opacity="0.95"/>
      <circle cx="18" cy="18" r="4" fill="#22D3EE" fill-opacity="0.85"/>
    </g>
    <text x="652" y="127" text-anchor="start" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="17" font-weight="700">create-awesome-vlang-app</text>
  </g>

  <!-- Left panel -->
  <g filter="url(#repo-shadow)">
    <rect x="146" y="198" width="522" height="284" rx="28" fill="#020617" fill-opacity="0.88" stroke="#334155"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
    <!-- "OPEN SOURCE" pill -->
    <rect x="184" y="234" width="154" height="38" rx="19" fill="#8B5CF6" fill-opacity="0.16" stroke="#C4B5FD" stroke-opacity="0.62"/>
    <text x="261" y="258" text-anchor="middle" fill="#EDE9FE" font-size="15" font-weight="800" letter-spacing="0.8">OPEN SOURCE</text>

    <!-- Main copy -->
    <text x="184" y="324" fill="#F8FAFC" font-size="44" font-weight="900" letter-spacing="-1.2">Scaffold V projects.</text>
    <text x="184" y="376" fill="#E2E8F0" font-size="44" font-weight="900" letter-spacing="-1.2">Compose templates.</text>
    <text x="184" y="424" fill="#94A3B8" font-size="22" font-weight="500">CLI · core engine · templates · extensions.</text>
  </g>

  <!-- Terminal command -->
  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace">
    <rect x="184" y="450" width="512" height="42" rx="13" fill="#0B1226" stroke="#06B6D4" stroke-opacity="0.7"/>
    <text x="206" y="477" fill="#22D3EE" font-size="15" font-weight="700">create-vlang-app my-app --template web-server</text>
  </g>

  <!-- Right panel -->
  <g filter="url(#repo-shadow)">
    <rect x="738" y="196" width="384" height="292" rx="28" fill="#020617" fill-opacity="0.78" stroke="#334155"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="800">
    <!-- CLI PACKAGE pill -->
    <rect x="792" y="244" width="276" height="42" rx="21" fill="#8B5CF6" fill-opacity="0.16" stroke="#C4B5FD" stroke-opacity="0.66"/>
    <text x="930" y="271" text-anchor="middle" fill="#EDE9FE" font-size="15">CLI PACKAGE</text>
    <!-- Connector line -->
    <path d="M930 294V312" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>

    <!-- CORE ENGINE pill -->
    <rect x="792" y="320" width="276" height="42" rx="21" fill="#06B6D4" fill-opacity="0.18" stroke="#22D3EE" stroke-opacity="0.66"/>
    <text x="930" y="347" text-anchor="middle" fill="#CFFAFE" font-size="15">CORE ENGINE</text>
    <!-- Connector line -->
    <path d="M930 370V388" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>

    <!-- TEMPLATES + EXTENSIONS pill -->
    <rect x="792" y="396" width="276" height="42" rx="21" fill="#7C3AED" fill-opacity="0.16" stroke="#A78BFA" stroke-opacity="0.66"/>
    <text x="930" y="423" text-anchor="middle" fill="#EDE9FE" font-size="15">TEMPLATES + EXTENSIONS</text>
  </g>

  <!-- Ambient decoration -->
  <g opacity="0.6">
    <circle cx="1102" cy="214" r="5" fill="#8B5CF6"/>
    <circle cx="1126" cy="468" r="5" fill="#06B6D4"/>
    <circle cx="704" cy="178" r="4" fill="#C4B5FD"/>
    <circle cx="1162" cy="340" r="3.5" fill="#06B6D4" fill-opacity="0.7"/>
    <line x1="1102" y1="219" x2="1162" y2="337" stroke="#06B6D4" stroke-opacity="0.18" stroke-width="1.5"/>
    <line x1="1102" y1="219" x2="1126" y2="463" stroke="#8B5CF6" stroke-opacity="0.18" stroke-width="1.5"/>
  </g>
</svg>
