name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # v1.7 lacks prebuilt installs; pin until v1.8 ships (setup-v#60).
      - uses: vlang/setup-v@86491f8df5313918daebeea16f187fa28c223edd
        with:
          version-file: .v-version
      - name: Run tests
        run: make test
