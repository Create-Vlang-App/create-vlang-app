name: Cross-platform smoke
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v7
      - uses: vlang/setup-v@b7d5f895bdb0395f03cf899f4e860d97e89751b5
        with:
          version-file: .v-version
          cache: true
      - shell: bash
        run: make build
      - shell: bash
        run: |
          ./create-vlang-app "$RUNNER_TEMP/cva-smoke" \
            --template minimal \
            --fixture \
            --no-interactive --force --no-install
          test -f "$RUNNER_TEMP/cva-smoke/v.mod"

  addon-combo:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: vlang/setup-v@b7d5f895bdb0395f03cf899f4e860d97e89751b5
        with:
          version-file: .v-version
          cache: true
      - shell: bash
        run: make build
      - shell: bash
        run: |
          ./create-vlang-app "$RUNNER_TEMP/cva-combo" \
            --template minimal --addons github-setup \
            --fixture --no-interactive --force --no-install
          test -f "$RUNNER_TEMP/cva-combo/v.mod"
          test -f "$RUNNER_TEMP/cva-combo/src/addon.v"

  install-sh:
    name: curl|sh installer
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install from GitHub Release via scripts/install.sh
        run: |
          set -euo pipefail
          DEST="${RUNNER_TEMP}/cva-install-bin"
          CVA_INSTALL_DIR="$DEST" sh scripts/install.sh
          export PATH="${DEST}:${PATH}"
          create-vlang-app --version | grep -qE '[0-9]+\.[0-9]+\.[0-9]+'
          create-awesome-vlang-app --version | grep -qE '[0-9]+\.[0-9]+\.[0-9]+'
          test -L "${DEST}/create-awesome-vlang-app"
      - name: Dry-run
        run: CVA_DRY_RUN=1 sh scripts/install.sh
