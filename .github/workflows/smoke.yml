name: Cross-platform smoke
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:
permissions: { contents: read }
jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: vlang/setup-v@v1
        with: { version-file: .v-version }
      - shell: bash
        run: make build
      - shell: bash
        run: |
          ./create-vlang-app "$RUNNER_TEMP/cva-smoke" \
            --template minimal \
            --catalog-path fixtures/catalog/templates.json \
            --no-interactive --force --no-install || true
          ls "$RUNNER_TEMP/cva-smoke" || true
