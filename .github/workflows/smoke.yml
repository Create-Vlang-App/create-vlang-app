name: Cross-platform smoke
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v7
      - uses: vlang/setup-v@12a9fab625c7fd9e51972eef71c84c3d4f41c45c
        with:
          version-file: .v-version
          cache: true
      - shell: bash
        run: make build
      - shell: bash
        run: |
          ./create-vlang-app "$RUNNER_TEMP/cva-smoke" \
            --template minimal \
            --fixture \
            --no-interactive --force --no-install
          test -f "$RUNNER_TEMP/cva-smoke/v.mod"

  addon-combo:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: vlang/setup-v@12a9fab625c7fd9e51972eef71c84c3d4f41c45c
        with:
          version-file: .v-version
          cache: true
      - shell: bash
        run: make build
      - shell: bash
        run: |
          ./create-vlang-app "$RUNNER_TEMP/cva-combo" \
            --template minimal --addons github-setup \
            --fixture --no-interactive --force --no-install
          test -f "$RUNNER_TEMP/cva-combo/v.mod"
          test -f "$RUNNER_TEMP/cva-combo/src/addon.v"
