name: OSV
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule: [{ cron: "0 6 * * 1" }]
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
jobs:
  osv:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v7
      - uses: google/osv-scanner-action/osv-scanner-action@v2.0.1
        with:
          scan-args: |-
            --recursive
            ./
