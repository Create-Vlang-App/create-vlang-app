name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: vlang/setup-v@b7d5f895bdb0395f03cf899f4e860d97e89751b5
        with:
          version-file: .v-version
      - name: Check formatting
        run: make fmt-check
      - name: Vet modules
        run: make vet
